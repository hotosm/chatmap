<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>HOT ChatMap - Terremoto Venezuela</title>
  <!-- Matomo -->
  <script>
    var _paq = window._paq = window._paq || [];
    /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
    _paq.push(['disableCookies']);
    _paq.push(['trackPageView']);
    (function() {
      var u="//matomo.hotosm.org/";
      _paq.push(['setTrackerUrl', u+'matomo.php']);
      _paq.push(['setSiteId', '33']);
      var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
      g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
    })();
    window.onload = () => {
      window._CHATMAP = {
        mapData: () => window._paq.push(['trackEvent', 'Create', 'Map', 'chatmap-create-map', 1])
      }
    }
  </script>
  <!-- End Matomo Code -->
   <style>
    body {
        padding: 40px;
    }
    .main {
        text-align: center;
        margin: 0 auto;
        font-family: Archivo, Arial, Helvetica, sans-serif;
    }
    a {
        color: #C53639;
        font-weight: bold;
        font-size: 1.5rem;
    }
    h2 {
        font-weight: 300;
    }
    h3 {
        font-size: 1.5rem;
    }
   </style>
</head>
<body>
    <div class="main">
        <h1>Venezuela 🇻🇪</h1>
        <h2>Mapear el Terremoto con ChatMap</h2>
        <h4>👉 Daños de todos niveles y escombros tapando calles</h4>
        <h3>Únete al grupo de WhatsApp:</h3>
        <p><a href="https://bit.ly/3QFAKTe">https://bit.ly/3QFAKTe</a></p>
        <img width="150px" src="/vzla-qr.png" />
        <p>
            <img width="150px" src="https://raw.githubusercontent.com/hotosm/ui-design/refs/heads/main/assets/logo/hot-logo-png.png" />
        </p>
    </div>
</body>
</html>
